<!DOCTYPE html>
<html>
<head>
  <title>WebRTC Receiver</title>
</head>
<body>
  <video id="remoteVideo" autoplay playsinline controls></video>
  <script>
    const ws = new WebSocket("ws://127.0.0.1:8765");
    const pc = new RTCPeerConnection({
      iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
    });

    // 1. Register with signaling server
    ws.onopen = () => {
      ws.send(JSON.stringify({ type: "register", id: "receiver" }));
    };

    // 2. Display incoming video
    pc.ontrack = (event) => {
      document.getElementById("remoteVideo").srcObject = event.streams[0];
    };

    // 3. Forward ICE candidates to sender
    pc.onicecandidate = (event) => {
      if (event.candidate) {
        ws.send(JSON.stringify({
          type: "ice",
          target: "sender",
          from: "receiver",
          candidate: event.candidate
        }));
      }
    };

    // 4. Handle messages from signaling server
    ws.onmessage = async (event) => {
      const data = JSON.parse(event.data);

      if (data.type === "offer") {
        await pc.setRemoteDescription(new RTCSessionDescription(data));
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        ws.send(JSON.stringify({
          type: "answer",
          target: data.from,   // ✅ fixed: was data.sender
          from: "receiver",
          sdp: answer.sdp
        }));

      } else if (data.type === "ice") {  // ✅ fixed: was "candidate"
        await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
      }
    };
  </script>
</body>
</html>
